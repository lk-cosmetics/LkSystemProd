name: Deploy to VPS

# Production deploy. Only fires when a commit lands on ``main`` — typically
# via a merged Pull Request from ``dev``. Protect the ``main`` branch in
# GitHub Settings → Branches so direct pushes are blocked.
on:
  push:
    branches: [main]
  workflow_dispatch:   # Manual "deploy current main" button.

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Run the same CI sanity-checks one more time *before* touching the VPS.
  # Cheap insurance against a force-push that bypasses the PR gate.
  # ─────────────────────────────────────────────────────────────────────────
  pre-deploy-checks:
    name: Pre-deploy sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Backend builds
        uses: docker/build-push-action@v5
        with:
          context: LkSystemBackEnd
          file: LkSystemBackEnd/Dockerfile
          push: false
          load: false
      - name: Frontend builds
        uses: docker/build-push-action@v5
        with:
          context: lkSystemFrontEnd
          file: lkSystemFrontEnd/Dockerfile
          push: false
          load: false
          build-args: |
            VITE_API_BASE_URL=

  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    needs: pre-deploy-checks
    environment:
      name: production
      # NOTE: ``environment.url`` has no access to the ``secrets`` context
      # (GitHub exposes only github/needs/vars/steps/env here) — referencing
      # ``secrets.PRODUCTION_DOMAIN`` directly is what made the file invalid.
      # We compose the URL in the step below and read its output here instead.
      url: ${{ steps.env_url.outputs.url }}

    steps:
      - name: Resolve environment URL
        # Builds the clickable deployment link shown on the GitHub "production"
        # environment. PRODUCTION_DOMAIN stays a secret; only the composed URL
        # is exposed as a step output, which ``environment.url`` *can* read.
        id: env_url
        run: echo "url=https://${PRODUCTION_DOMAIN}" >> "$GITHUB_OUTPUT"
        env:
          PRODUCTION_DOMAIN: ${{ secrets.PRODUCTION_DOMAIN }}

      - name: Validate required secrets
        # Fail fast with a readable message rather than letting ssh-action
        # spit out a cryptic "missing key" trace half a minute later.
        run: |
          for v in SSH_HOST SSH_USER SSH_PRIVATE_KEY VPS_PROJECT_PATH PRODUCTION_DOMAIN; do
            if [ -z "${!v}" ]; then
              echo "::error::Required secret $v is not set in the 'production' environment."
              exit 1
            fi
          done
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_PROJECT_PATH: ${{ secrets.VPS_PROJECT_PATH }}
          PRODUCTION_DOMAIN: ${{ secrets.PRODUCTION_DOMAIN }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          # Stop the deploy as soon as anything goes wrong rather than ending
          # up with a half-rebuilt stack.
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_PROJECT_PATH }}"

            echo "── Pulling latest main ───────────────────────────────────"
            git fetch --all --prune
            git reset --hard origin/main

            echo "── Building & restarting containers ──────────────────────"
            # No sudo: runs as the (docker-group) deploy user. deploy-production.sh
            # skips its root-only TLS pre-flight when not root, and nginx still
            # gets the cert via the root Docker daemon's bind-mount of
            # /etc/letsencrypt (see docker-compose.prod.yml). DOMAIN mirrors the
            # working manual run and feeds compose interpolation (cert path,
            # ALLOWED_HOSTS, …). Requires the deploy user to be in the docker group.
            DOMAIN="${{ secrets.PRODUCTION_DOMAIN }}" bash deploy/deploy-production.sh

            echo "── Pruning dangling images ───────────────────────────────"
            docker image prune -f

      - name: Health check
        # Probe the public domain over HTTPS. Retry a few times to ride out
        # the brief window while containers come back up after the rebuild.
        env:
          DOMAIN: ${{ secrets.PRODUCTION_DOMAIN }}
        run: |
          set -e
          for attempt in 1 2 3 4 5 6; do
            sleep $((attempt * 5))
            code=$(curl -s -o /dev/null -w '%{http_code}' "https://${DOMAIN}/health" || echo "000")
            echo "attempt ${attempt}: /health → ${code}"
            if [ "$code" = "200" ]; then
              # Then poke the API root just to be sure the backend is up too.
              api_code=$(curl -s -o /dev/null -w '%{http_code}' "https://${DOMAIN}/api/v1/" || echo "000")
              echo "api root → ${api_code}"
              # 200/401/403 all mean the app responded; only network errors fail.
              case "$api_code" in 2*|4*) exit 0 ;; esac
            fi
          done
          echo "::error::Production health check failed."
          exit 1
