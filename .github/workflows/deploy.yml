name: Deploy to VPS

# Production deploy. Only fires when a commit lands on ``main`` — typically
# via a merged Pull Request from ``dev``. Protect the ``main`` branch in
# GitHub Settings → Branches so direct pushes are blocked.
on:
  push:
    branches: [main]
  workflow_dispatch:   # Manual "deploy current main" button.

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Run the same CI sanity-checks one more time *before* touching the VPS.
  # Cheap insurance against a force-push that bypasses the PR gate.
  # ─────────────────────────────────────────────────────────────────────────
  pre-deploy-checks:
    name: Pre-deploy sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Backend builds
        uses: docker/build-push-action@v5
        with:
          context: LkSystemBackEnd
          file: LkSystemBackEnd/Dockerfile
          push: false
          load: false
      - name: Frontend builds
        uses: docker/build-push-action@v5
        with:
          context: lkSystemFrontEnd
          file: lkSystemFrontEnd/Dockerfile
          push: false
          load: false
          build-args: |
            VITE_API_BASE_URL=

  deploy:
    name: Deploy over SSH
    # Runs on a GitHub-hosted runner and connects to the VPS over SSH using the
    # repository's SSH_* secrets — no self-hosted runner to install/maintain.
    # If a connection ever fails ("Cannot reach SSH host/port"), it's almost
    # always the VPS firewall: make sure the SSH port is reachable from GitHub
    # Actions' egress IPs (open the port, or allow GitHub's IP ranges).
    runs-on: ubuntu-latest
    needs: pre-deploy-checks
    environment:
      name: production
      # ``environment.url`` cannot read ``secrets`` — compose the URL in a step
      # below and reference its output here instead.
      url: ${{ steps.env_url.outputs.url }}

    steps:
      - name: Validate required secrets
        run: |
          for v in SSH_HOST SSH_PORT SSH_USER SSH_PRIVATE_KEY VPS_PROJECT_PATH PRODUCTION_DOMAIN; do
            if [ -z "${!v}" ]; then
              echo "::error::Required secret $v is not set."
              exit 1
            fi
          done
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_PROJECT_PATH: ${{ secrets.VPS_PROJECT_PATH }}
          PRODUCTION_DOMAIN: ${{ secrets.PRODUCTION_DOMAIN }}

      - name: Resolve environment URL
        # Composes the clickable deployment link for the GitHub "production"
        # environment. PRODUCTION_DOMAIN stays secret; only the URL is exposed.
        id: env_url
        run: echo "url=https://${PRODUCTION_DOMAIN}" >> "$GITHUB_OUTPUT"
        env:
          PRODUCTION_DOMAIN: ${{ secrets.PRODUCTION_DOMAIN }}

      - name: Deploy to the VPS over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # The image build can take several minutes — don't reap it early.
          command_timeout: 30m
          # Abort on the first failing command in the remote script.
          script_stop: true
          # Forward these workflow env vars into the remote shell session.
          envs: VPS_PROJECT_PATH,PRODUCTION_DOMAIN
          script: |
            set -euo pipefail
            cd "$VPS_PROJECT_PATH"

            echo "── Pulling latest main ───────────────────────────────────"
            git fetch --all --prune
            git reset --hard origin/main

            echo "── Building & restarting containers ──────────────────────"
            # deploy-production.sh skips its root-only TLS pre-flight when run by
            # a non-root, docker-group user; nginx still gets the cert via the
            # root Docker daemon's bind-mount of /etc/letsencrypt. DOMAIN feeds
            # compose interpolation (cert path, ALLOWED_HOSTS, …).
            DOMAIN="$PRODUCTION_DOMAIN" bash deploy/deploy-production.sh

            echo "── Pruning dangling images ───────────────────────────────"
            docker image prune -f
        env:
          VPS_PROJECT_PATH: ${{ secrets.VPS_PROJECT_PATH }}
          PRODUCTION_DOMAIN: ${{ secrets.PRODUCTION_DOMAIN }}

      - name: Health check
        # Probe the public domain over HTTPS. Retry a few times to ride out
        # the brief window while containers come back up after the rebuild.
        env:
          DOMAIN: ${{ secrets.PRODUCTION_DOMAIN }}
        run: |
          set -e
          for attempt in 1 2 3 4 5 6; do
            sleep $((attempt * 5))
            code=$(curl -s -o /dev/null -w '%{http_code}' "https://${DOMAIN}/health" || echo "000")
            echo "attempt ${attempt}: /health → ${code}"
            if [ "$code" = "200" ]; then
              # Then poke the API root just to be sure the backend is up too.
              api_code=$(curl -s -o /dev/null -w '%{http_code}' "https://${DOMAIN}/api/v1/" || echo "000")
              echo "api root → ${api_code}"
              # 200/401/403 all mean the app responded; only network errors fail.
              case "$api_code" in 2*|4*) exit 0 ;; esac
            fi
          done
          echo "::error::Production health check failed."
          exit 1
