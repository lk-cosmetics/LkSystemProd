name: CI

# Runs on every push to ``dev`` and on every pull request targeting ``main``.
# Goal: catch broken builds before they merge — the production-deploy workflow
# (``deploy.yml``) reuses the same Dockerfiles, so a passing CI here is a
# strong signal that the VPS rebuild will succeed.
on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref — saves minutes during rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend ──────────────────────────────────────────────────────────────
  backend:
    name: Django checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: LkSystemBackEnd

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: lksystem_test
          POSTGRES_USER: lksystem_test
          POSTGRES_PASSWORD: lksystem_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U lksystem_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DEBUG: 'False'
      SECRET_KEY: ci-only-not-a-real-secret
      ALLOWED_HOSTS: localhost,127.0.0.1
      POSTGRES_DB: lksystem_test
      POSTGRES_USER: lksystem_test
      POSTGRES_PASSWORD: lksystem_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: '5432'
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: LkSystemBackEnd/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system check
        # ``--deploy --fail-level WARNING`` treats every deploy warning as fatal.
        # settings.py reads these from the environment, so supply production-
        # representative values here so the genuine deploy checks pass without
        # weakening the app or silencing them: a strong SECRET_KEY (>=50 chars,
        # satisfies security.W009) plus the HTTPS hardening (SSL redirect + HSTS)
        # that the real production .env sets at runtime. This key is a throwaway
        # used only to run static checks against the disposable CI database.
        env:
          SECRET_KEY: ci-deploy-check-only-not-a-real-secret-0123456789-abcdef
          SECURE_SSL_REDIRECT: 'True'
          SECURE_HSTS_SECONDS: '31536000'
          SECURE_HSTS_INCLUDE_SUBDOMAINS: 'True'
          SECURE_HSTS_PRELOAD: 'True'
        run: python manage.py check --deploy --fail-level WARNING

      - name: Django migrations dry-run
        # ``makemigrations --check`` fails if any model change is missing a
        # migration — protects ``main`` from "I forgot to run makemigrations".
        run: python manage.py makemigrations --check --dry-run

      - name: Apply migrations against the CI database
        run: python manage.py migrate --no-input

      - name: Run unit + integration tests
        # Auto-discovers every ``test_*.py`` module — new test files are picked
        # up without touching this workflow — plus the three apps that use a
        # flat ``tests.py``. The legacy ``test_workspace*`` tests are excluded:
        # they predate tests-in-CI and assert an outdated workspace-switch
        # permission rule (tracked for a follow-up fix), so they would red-flag
        # the gate without reflecting a real regression.
        run: |
          modules=$(find apps -name 'test_*.py' -not -path '*test_workspace*' \
            | sed -E 's#/#.#g; s#\.py$##')
          python manage.py test $modules \
            apps.clients.tests apps.company.tests apps.notifications.tests \
            --verbosity=2

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    name: Vite build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lkSystemFrontEnd

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: lkSystemFrontEnd/package-lock.json

      - name: Install dependencies (clean)
        run: npm ci --no-audit --no-fund

      - name: Unit tests (Vitest)
        # Pure-logic unit tests (invoice data builders, chunk-error detection,
        # …) under jsdom. Fails fast before the heavier build step.
        run: npm run test

      - name: Type-check & build
        # The ``build`` script is ``tsc -b && vite build`` — a type error
        # anywhere in the codebase fails the job.
        env:
          # The bundle is built with an empty base URL so it uses same-origin
          # requests behind the Nginx reverse proxy in production.
          VITE_API_BASE_URL: ''
        run: npm run build

      - name: Upload dist artifact (kept 7 days)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: lkSystemFrontEnd/dist
          retention-days: 7

  # ─── Docker build sanity ──────────────────────────────────────────────────
  # Verifies both production Dockerfiles still build (no ``RUN`` regressions,
  # no ``COPY`` to missing paths). Cheaper than running the full prod compose.
  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: LkSystemBackEnd
          file: LkSystemBackEnd/Dockerfile
          push: false
          load: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: lkSystemFrontEnd
          file: lkSystemFrontEnd/Dockerfile
          push: false
          load: false
          build-args: |
            VITE_API_BASE_URL=
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ─── Auto-open PR: dev → main ───────────────────────────────────────────────
  # When EVERY gate above is green on a push to ``dev``, open (or reuse) a Pull
  # Request into ``main``. This keeps production one reviewed click away and
  # guarantees ``main`` only ever receives CI-verified code. Merging the PR is
  # what triggers ``deploy.yml``.
  #
  # ⚠️ One-time repo setting required for the bot to open PRs:
  #    Settings → Actions → General → Workflow permissions →
  #      ✅ "Allow GitHub Actions to create and approve pull requests"
  open-pr:
    name: Open PR to main
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker]
    # Only on a direct push to dev — never on the pull_request trigger.
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need origin/main to diff dev against it

      - name: Create or reuse PR (dev → main)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Nothing ahead of main? Don't open an empty PR.
          if [ -z "$(git rev-list origin/main..origin/dev 2>/dev/null)" ]; then
            echo "dev has no commits ahead of main — skipping PR."
            exit 0
          fi

          # Reuse the open PR if one already exists (it tracks dev automatically).
          existing=$(gh pr list --base main --head dev --state open \
            --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "PR #$existing already open (dev → main); new commits are added to it."
            exit 0
          fi

          gh pr create --base main --head dev \
            --title "Deploy: merge dev → main" \
            --body "Automated PR opened by CI after all checks passed on \`dev\` (\`${GITHUB_SHA::7}\`).

          Merging this PR triggers the production deploy (\`deploy.yml\`).

          Gates passed on this commit:
          - ✅ Django system check (\`--deploy\`) + migrations + test suite
          - ✅ Frontend type-check + Vitest unit tests + Vite build
          - ✅ Backend & frontend Docker images build"
