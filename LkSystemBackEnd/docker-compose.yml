services:
  db:
    image: postgres:15-alpine
    container_name: lksystem_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lksystem
      POSTGRES_USER: lksystem_user
      POSTGRES_PASSWORD: lksystem_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lksystem_user -d lksystem"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: lksystem_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lksystem_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DEBUG=True
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    command: ["gunicorn", "--bind", "0.0.0.0:8000", "--workers", "3", "--timeout", "180", "--graceful-timeout", "30", "core.wsgi:application"]

  # Development service (use: docker-compose up web-dev)
  web-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lksystem_web_dev
    env_file:
      - .env
    environment:
      - DEBUG=True
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
