# ── HTTP: redirect all traffic to HTTPS ──────────────────────────────
server {
    listen 80;
    server_name ${PUBLIC_DOMAIN};

    # Health check stays on HTTP (for Docker healthcheck)
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host${HTTPS_PORT_SUFFIX}$request_uri;
    }
}

# ── HTTPS: main server ──────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name ${PUBLIC_DOMAIN};

    ssl_certificate     ${SSL_CERTIFICATE};
    ssl_certificate_key ${SSL_CERTIFICATE_KEY};
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25m;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files /index.html =404;
    }

    # Service worker must NEVER be cached, so a new deploy is detected on the
    # next load and the worker updates (then serves the fresh, revisioned
    # precache from /assets/). Caching sw.js is the classic way clients get
    # stuck on an old build — don't.
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache" always;
        default_type application/manifest+json;
        try_files $uri =404;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Public landing: the bare root redirects to the marketing site instead of
    # serving an in-app home page. The SPA (login/dashboard) is reached via its
    # own paths and is unaffected. Exact-match so ONLY "/" redirects.
    location = / {
        return 302 https://therapybylk.com/;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://${BACKEND_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        # A synchronous WooCommerce catalogue/order sync can take a couple of
        # minutes for a large store; don't cut it off at nginx's 60s default
        # (the client uses a matching long timeout for those specific calls).
        proxy_connect_timeout 75s;
        proxy_send_timeout 240s;
        proxy_read_timeout 240s;
    }

    # ── WebSocket endpoint → daphne ASGI sidecar ─────────────────────────
    # Real-time order queue / inventory / sales-channels. gunicorn keeps
    # serving every other HTTP path, so the REST surface is untouched.
    #
    # A runtime resolver + variable upstream is used (same trick as /wp-proxy/
    # below) so nginx still boots when the ws service is briefly down and
    # re-resolves it after a restart, instead of caching a stale boot-time IP.
    # If ws is unreachable the SPA's polling fallback keeps the queue fresh.
    location /ws/ {
        resolver 127.0.0.11 ipv6=off valid=10s;
        resolver_timeout 5s;
        set $ws_upstream "${WS_UPSTREAM}";

        proxy_pass http://$ws_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WS sockets are long-lived; don't reap them at nginx's 60s default.
        proxy_connect_timeout 75s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Django admin site, served at an obscured path (/secure-access-lk/).
    # Without this block it would fall through to the SPA fallback and serve
    # React's index.html. Auth, CSRF, sessions, and the admin's own static
    # files all flow through the backend as expected.
    location /secure-access-lk/ {
        proxy_pass http://${BACKEND_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://localhost:8000/ https://$host/;
        proxy_redirect http://${BACKEND_UPSTREAM}/ https://$host/;
        proxy_request_buffering off;
    }

    location /media/ {
        alias /usr/share/nginx/html/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        error_page 404 = @media_backend;
    }

    location @media_backend {
        proxy_pass http://${BACKEND_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://${BACKEND_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy external WordPress/WooCommerce product images.
    # Uses a variable for proxy_pass so Nginx resolves DNS at request time
    # (not at startup, which fails in Docker if external DNS is unavailable).
    location /wp-proxy/ {
        # Docker embedded DNS resolver (works reliably inside Compose networks).
        # Public resolvers can be blocked/unreachable from some environments.
        resolver 127.0.0.11 ipv6=off valid=60s;
        resolver_timeout 5s;

        set $wp_upstream "https://therapybylk.com";

        rewrite ^/wp-proxy/(.*)$ /$1 break;

        proxy_pass $wp_upstream;
        proxy_ssl_server_name on;
        proxy_set_header Host therapybylk.com;
        proxy_set_header Referer "";
        proxy_set_header Accept-Encoding "";
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie;

        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
