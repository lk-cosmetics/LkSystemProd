# ── HTTP: redirect all traffic to HTTPS ──────────────────────────────
server {
    listen 80;
    server_name ${PUBLIC_DOMAIN};

    # Health check stays on HTTP (for Docker healthcheck)
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host${HTTPS_PORT_SUFFIX}$request_uri;
    }
}

# ── HTTPS: main server ──────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name ${PUBLIC_DOMAIN};

    ssl_certificate     ${SSL_CERTIFICATE};
    ssl_certificate_key ${SSL_CERTIFICATE_KEY};
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25m;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files /index.html =404;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://${BACKEND_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        # A synchronous WooCommerce catalogue/order sync can take a couple of
        # minutes for a large store; don't cut it off at nginx's 60s default
        # (the client uses a matching long timeout for those specific calls).
        proxy_connect_timeout 75s;
        proxy_send_timeout 240s;
        proxy_read_timeout 240s;
    }

    # Django admin site. Without this block ``/admin/`` falls through to the
    # SPA fallback below and serves React's index.html — which is why the
    # admin appeared "missing" in production. Auth, CSRF, sessions, and the
    # admin's own static files all flow through the backend as expected.
    location /admin/ {
        proxy_pass http://${BACKEND_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }

    location /media/ {
        alias /usr/share/nginx/html/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        error_page 404 = @media_backend;
    }

    location @media_backend {
        proxy_pass http://${BACKEND_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://${BACKEND_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy external WordPress/WooCommerce product images.
    # Uses a variable for proxy_pass so Nginx resolves DNS at request time
    # (not at startup, which fails in Docker if external DNS is unavailable).
    location /wp-proxy/ {
        # Docker embedded DNS resolver (works reliably inside Compose networks).
        # Public resolvers can be blocked/unreachable from some environments.
        resolver 127.0.0.11 ipv6=off valid=60s;
        resolver_timeout 5s;

        set $wp_upstream "https://therapybylk.com";

        rewrite ^/wp-proxy/(.*)$ /$1 break;

        proxy_pass $wp_upstream;
        proxy_ssl_server_name on;
        proxy_set_header Host therapybylk.com;
        proxy_set_header Referer "";
        proxy_set_header Accept-Encoding "";
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie;

        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
